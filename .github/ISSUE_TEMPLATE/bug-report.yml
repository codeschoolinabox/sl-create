name: Bug Report
description: Report a bug
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below
        so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        Minimal code example that demonstrates the bug.
        Include the exact code, configuration, and function calls.
      placeholder: |
        ```bash
        npm create @study-lenses
        # Package name: my-tool
        # Description: My tool description
        # Expected: sl-my-tool/ created with all placeholders replaced
        # Actual: [describe what happened]
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: 'Run `node --version` and paste the output.'
      placeholder: 'v22.0.0'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: 'The version from your package.json or `npm ls @study-lenses/create`.'
      placeholder: '1.0.0'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information.
    validations:
      required: false
